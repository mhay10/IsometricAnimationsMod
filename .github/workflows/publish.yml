name: Publish Mod
on:
  workflow_dispatch:
    inputs:
      release_github:
        type: boolean
        description: "Github Release"
        default: false

      release_modrinth:
        type: boolean
        description: "Modrinth Release"
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/openjdk/jdk:21-ubuntu
      options: --user root
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Build with Gradle
        run: ./gradlew clean build
          
      - name: Upload Build Artifact
        uses: actions/upload-artifact@v4
        with:
          name: built-jars
          path: build/libs/*.jar

  publish:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: built-jars
          path: build/libs

      - name: Set Mod Version
        id: mod_version
        run: |
          MOD_VERSION=$(grep '^mod_version=' ./gradle.properties | cut -d '=' -f 2)
          echo "MOD_VERSION=$MOD_VERSION" >> $GITHUB_ENV
        
      - name: Publish to GitHub
        if: ${{ inputs.release_github == true }}
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.MOD_VERSION }}
          files: |
            build/libs/*.jar
            !build/lib/*-sources.jar

