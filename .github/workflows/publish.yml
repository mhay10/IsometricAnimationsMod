name: Publish Mod
on:
  workflow_dispatch:
    inputs:
      github_repo:
        type: string
        description: "Github Repository"
        default: "mhay10/IsometricAnimationsMod"

      release_github:
        type: boolean
        description: "Github Release"
        default: false

      release_modrinth:
        type: boolean
        description: "Modrinth Release"
        default: false

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: mcr.microsoft.com/openjdk/jdk:21-ubuntu
      options: --user root
    steps:
      - uses: actions/checkout@v4
      - run: ./gradlew clean build publishMods
        env:
          RELEASE_GITHUB: ${{ inputs.release_github }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO: ${{ inputs.github_repo }}

          RELEASE_MODRINTH: ${{ inputs.release_modrinth }}
          MODRINTH_TOKEN: ${{ secrets.MODRINTH_TOKEN }}
